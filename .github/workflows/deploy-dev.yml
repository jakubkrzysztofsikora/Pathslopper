name: Deploy Dev

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or SHA). Defaults to the current branch.'
        required: false
        default: ''
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

concurrency:
  # One live deploy per environment at a time, serialising Terraform apply
  # as a substitute for Object Storage-backed state locking.
  group: deploy-dev
  cancel-in-progress: false

jobs:
  ci:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'deploy-dev')
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: dev
    env:
      SCW_REGION: ${{ vars.SCW_REGION || 'fr-par' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
      AWS_REGION: ${{ vars.SCW_REGION || 'fr-par' }}
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      SCW_DEFAULT_REGION: ${{ vars.SCW_REGION || 'fr-par' }}
      SCW_DEFAULT_ZONE: ${{ vars.SCW_ZONE || 'fr-par-1' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.head_ref || github.ref_name }}

      - name: Compute image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.${{ env.SCW_REGION }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: rg.${{ env.SCW_REGION }}.scw.cloud/pathfinder-nexus-dev/app:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.5'
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform select workspace
        working-directory: infra/terraform
        run: terraform workspace select dev || terraform workspace new dev

      - name: Terraform apply (dev)
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var environment=dev \
            -var image_tag=${{ steps.tag.outputs.sha }}

      - name: Capture outputs
        id: outputs
        working-directory: infra/terraform
        run: |
          echo "container_url=$(terraform output -raw container_url)" >> "$GITHUB_OUTPUT"
          echo "health_url=$(terraform output -raw health_url)" >> "$GITHUB_OUTPUT"

      - name: Smoke test health endpoint
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "${{ steps.outputs.outputs.health_url }}" ; then
              echo ""
              echo "Health OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check did not succeed after 5 attempts." >&2
          exit 1

      - name: Post preview URL to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.outputs.outputs.container_url }}';
            const sha = '${{ steps.tag.outputs.sha }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Dev preview deployed: ${url} (\`${sha}\`)`
            });

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy. Use a previous SHA to roll back.'
        required: false
        default: ''

permissions:
  contents: read
  deployments: write

# Opt JavaScript actions into Node.js 24 ahead of the June 2nd 2026
# default switch. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  # One live deploy at a time. Serialises terraform apply as a substitute
  # for state locking (Scaleway Object Storage has no DynamoDB equivalent).
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: prod
    env:
      SCW_REGION: ${{ vars.SCW_REGION || 'fr-par' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
      AWS_REGION: ${{ vars.SCW_REGION || 'fr-par' }}
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      SCW_DEFAULT_REGION: ${{ vars.SCW_REGION || 'fr-par' }}
      SCW_DEFAULT_ZONE: ${{ vars.SCW_ZONE || 'fr-par-1' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Compute image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.5'
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init

      # Query the Scaleway API for the current non-deprecated Redis version.
      # Hardcoded versions break when Scaleway retires them, so we discover
      # the latest at deploy time using the CI credentials.
      - name: Discover available Redis version
        id: redis
        run: |
          RESPONSE=$(curl -sf -H "X-Auth-Token: $SCW_SECRET_KEY" \
            "https://api.scaleway.com/redis/v1/zones/${SCW_DEFAULT_ZONE}/cluster-versions?include_deprecated=false&include_disabled=false")
          VERSION=$(echo "$RESPONSE" | python3 -c "import sys,json; vs=json.load(sys.stdin).get('versions',[]); print(vs[0]['version'] if vs else '')")
          if [ -z "$VERSION" ]; then
            echo "::error::Could not discover a valid Redis version from Scaleway API"
            echo "$RESPONSE"
            exit 1
          fi
          echo "redis_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Discovered Redis version: $VERSION"

      # Create the Container Registry namespace before pushing the image.
      # On the first deploy the namespace does not exist yet, so a targeted
      # apply bootstraps it without touching resources that depend on the
      # image tag. On subsequent deploys this is a no-op.
      - name: Ensure Container Registry exists
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -target=scaleway_registry_namespace.this \
            -var image_tag=bootstrap \
            -var redis_version=${{ steps.redis.outputs.redis_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.${{ env.SCW_REGION }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            rg.${{ env.SCW_REGION }}.scw.cloud/pathfinder-nexus/app:${{ steps.tag.outputs.sha }}
            rg.${{ env.SCW_REGION }}.scw.cloud/pathfinder-nexus/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Terraform apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var image_tag=${{ steps.tag.outputs.sha }} \
            -var redis_version=${{ steps.redis.outputs.redis_version }}

      - name: Capture outputs
        id: outputs
        working-directory: infra/terraform
        run: |
          echo "container_url=$(terraform output -raw container_url)" >> "$GITHUB_OUTPUT"
          echo "health_url=$(terraform output -raw health_url)" >> "$GITHUB_OUTPUT"

      - name: Smoke test health endpoint
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "${{ steps.outputs.outputs.health_url }}" ; then
              echo ""
              echo "Health OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Health check did not succeed after 5 attempts." >&2
          exit 1

      - name: Create GitHub deployment record
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'prod',
              auto_merge: false,
              required_contexts: [],
              description: 'Scaleway Serverless Container'
            });

  e2e:
    name: E2E Smoke (Playwright)
    needs: deploy
    runs-on: ubuntu-latest
    env:
      SCW_REGION: ${{ vars.SCW_REGION || 'fr-par' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
      AWS_REGION: ${{ vars.SCW_REGION || 'fr-par' }}
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      SCW_DEFAULT_REGION: ${{ vars.SCW_REGION || 'fr-par' }}
      SCW_DEFAULT_ZONE: ${{ vars.SCW_ZONE || 'fr-par-1' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - run: npx playwright install chromium

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.5'
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init

      - name: Read freshly deployed container URL
        id: outputs
        working-directory: infra/terraform
        run: echo "container_url=$(terraform output -raw container_url)" >> "$GITHUB_OUTPUT"

      - name: Run E2E against freshly deployed container
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.outputs.outputs.container_url }}
        run: npx playwright test --reporter=list
        timeout-minutes: 10
